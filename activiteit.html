<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBFAF6">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Brightly - Activiteit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar appbar-date">
      <button class="nav-day" id="dayPrev" type="button" aria-label="Vorige dag">‹</button>
      <button class="day-center" id="dayToday" type="button" aria-label="Terug naar vandaag">
        <span class="day-title" id="greeting">Vandaag</span>
        <span class="sub" id="dateLabel"></span>
      </button>
      <button class="nav-day" id="dayNext" type="button" aria-label="Volgende dag">›</button>
    </header>

    <main class="page">
      <!-- Totaal verbrand -->
      <div class="card weight-hero">
        <div class="wh-icon" style="background:#FFF1DF;color:#B5611A;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="wh-info">
          <div class="wh-label">Verbrand met beweging</div>
          <div class="wh-value"><span id="burnTotal">0</span> <span class="wh-unit">kcal</span></div>
        </div>
      </div>

      <!-- Stappen -->
      <div class="card">
        <div class="card-title with-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Stappen</div>
        <div class="row">
          <div class="field">
            <label for="steps">Aantal stappen</label>
            <input class="input" id="steps" type="text" inputmode="numeric" placeholder="bv. 8000">
          </div>
          <div class="field">
            <label for="stepsKcal">≈ verbranding (kcal)</label>
            <input class="input" id="stepsKcal" type="text" inputmode="numeric" readonly>
          </div>
        </div>
        <button class="btn" id="saveSteps" type="button">Stappen opslaan</button>
      </div>

      <!-- Fitbit -->
      <div class="card" id="fitbitCard">
        <div class="card-title with-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Fitbit</div>
        <div class="hint" id="fitbitStatus" style="margin-bottom:12px;">Controleren…</div>
        <button class="btn btn-secondary" id="fitbitConnect" type="button">Koppel Fitbit (via Google)</button>
        <button class="btn btn-secondary" id="fitbitSync" type="button" style="display:none;">Stappen importeren</button>
        <button class="btn-ghost btn btn-sm" id="fitbitDisconnect" type="button" style="display:none;margin-top:8px;">Ontkoppelen</button>
      </div>

      <!-- Activiteit toevoegen -->
      <div class="card">
        <div class="card-title with-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Sport toevoegen</div>
        <div class="field">
          <label for="actType">Type</label>
          <select class="input" id="actType"></select>
        </div>
        <div class="row">
          <div class="field">
            <label for="actDur">Duur (min)</label>
            <input class="input" id="actDur" type="text" inputmode="numeric" placeholder="bv. 45">
          </div>
          <div class="field">
            <label for="actKcal">Verbranding (kcal)</label>
            <input class="input" id="actKcal" type="text" inputmode="numeric" placeholder="auto">
          </div>
        </div>
        <div class="hint" id="actHint">Laat verbranding leeg voor een automatische schatting.</div>
        <button class="btn" id="addAct" type="button">Toevoegen</button>
      </div>

      <!-- Lijst -->
      <div class="card">
        <div class="card-title">Vandaag gelogd</div>
        <div id="actList"></div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="dashboard.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>Vandaag</a>
      <a href="loggen.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>Zoeken</a>
      <a href="kalender.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>Kalender</a>
      <a href="profiel.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>Profiel</a>
    </nav>
  </div>

  <script src="js/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/fitbit.js"></script>
  <script src="js/activiteit.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
