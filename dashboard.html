<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBFAF6">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Brightly - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar appbar-date">
      <button class="nav-day" id="dayPrev" type="button" aria-label="Vorige dag">‹</button>
      <button class="day-center" id="dayToday" type="button" aria-label="Terug naar vandaag">
        <span class="day-title" id="greeting">Vandaag</span>
        <span class="sub" id="dateLabel"></span>
      </button>
      <button class="nav-day" id="dayNext" type="button" aria-label="Volgende dag">›</button>
    </header>

    <main class="page">
      <!-- Calorie-overzicht -->
      <div class="card kcal-card">
        <div class="kcal-top">
          <div class="ring">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="52" fill="none" stroke-width="11"/>
              <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52" fill="none" stroke-width="11"
                      stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
            </svg>
            <div class="ring-center">
              <span class="big" id="kcalLeft">0</span>
              <span class="small">kcal over</span>
            </div>
          </div>
          <div class="macros">
            <div class="macro">
              <div class="macro-row"><span class="lbl">Koolhydraten</span><span class="val" id="valCarb">0 g</span></div>
              <div class="bar"><i id="barCarb" class="carb" style="width:0%"></i></div>
            </div>
            <div class="macro">
              <div class="macro-row"><span class="lbl">Eiwit</span><span class="val" id="valProtein">0 g</span></div>
              <div class="bar"><i id="barProtein" class="protein" style="width:0%"></i></div>
            </div>
            <div class="macro">
              <div class="macro-row"><span class="lbl">Vet</span><span class="val" id="valFat">0 g</span></div>
              <div class="bar"><i id="barFat" class="fat" style="width:0%"></i></div>
            </div>
          </div>
        </div>
        <div class="kcal-foot">
          <span>Gegeten <b id="kcalEaten">0</b></span>
          <span>Doel <b id="kcalGoal">—</b></span>
        </div>
      </div>

      <!-- Maaltijden -->
      <div id="meals"></div>
    </main>

    <!-- Onderbalk -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="active"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>Vandaag</a>
      <a href="gewicht.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg></span>Gewicht</a>
      <a class="fab" href="loggen.html" aria-label="Loggen">+</a>
      <a href="loggen.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>Zoeken</a>
      <a href="profiel.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>Profiel</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
