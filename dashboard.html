<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>NutriX - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div>
        <h1 id="greeting">Vandaag</h1>
        <div class="sub" id="dateLabel"></div>
      </div>
      <button class="btn btn-secondary btn-sm" id="dayPrev" type="button" aria-label="Vorige dag">‹</button>
    </header>

    <main class="page">
      <!-- Calorie-overzicht -->
      <div class="card">
        <div class="kcal-hero">
          <div class="ring">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="52" fill="none" stroke-width="12"/>
              <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52" fill="none" stroke-width="12"
                      stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
            </svg>
            <div class="ring-center">
              <span class="big" id="kcalLeft">0</span>
              <span class="small">kcal over</span>
            </div>
          </div>
          <div class="macros">
            <div class="macro carb">
              <div class="lbl">Koolh.</div>
              <div class="bar"><i id="barCarb" style="width:0%"></i></div>
              <div class="val" id="valCarb">0 g</div>
            </div>
            <div class="macro protein">
              <div class="lbl">Eiwit</div>
              <div class="bar"><i id="barProtein" style="width:0%"></i></div>
              <div class="val" id="valProtein">0 g</div>
            </div>
            <div class="macro fat">
              <div class="lbl">Vet</div>
              <div class="bar"><i id="barFat" style="width:0%"></i></div>
              <div class="val" id="valFat">0 g</div>
            </div>
          </div>
        </div>
        <div class="spacer"></div>
        <div class="flex-between muted" style="font-size:.85rem;">
          <span>Gegeten: <b id="kcalEaten">0</b></span>
          <span>Doel: <b id="kcalGoal">—</b></span>
        </div>
      </div>

      <!-- Maaltijden -->
      <div id="meals"></div>
    </main>

    <!-- Onderbalk -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="active"><span class="ico">🏠</span>Vandaag</a>
      <a href="gewicht.html"><span class="ico">⚖️</span>Gewicht</a>
      <a class="fab" href="loggen.html" aria-label="Loggen">+</a>
      <a href="loggen.html"><span class="ico">🔍</span>Zoeken</a>
      <a href="profiel.html"><span class="ico">👤</span>Profiel</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
