<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>NutriX - Gewicht</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div><h1>Gewicht</h1><div class="sub" id="lastDate">Houd je gewicht bij</div></div>
      <div class="center"><b id="lastWeight"></b></div>
    </header>

    <main class="page">
      <form class="card" id="weightForm">
        <div class="card-title">Gewicht invullen</div>
        <div class="row">
          <div class="field" style="flex:1.3;">
            <label for="weight">Gewicht (kg)</label>
            <input class="input" id="weight" type="number" inputmode="decimal" step="0.1" min="1" placeholder="bv. 78.5" required>
          </div>
          <div class="field">
            <label for="date">Datum</label>
            <input class="input" id="date" type="date">
          </div>
        </div>
        <button class="btn" id="saveBtn" type="submit">Opslaan</button>
      </form>

      <div class="card">
        <div class="card-title">Verloop</div>
        <div id="chart"></div>
      </div>

      <div class="card">
        <div class="card-title">Recent</div>
        <div id="list"></div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="dashboard.html"><span class="ico">🏠</span>Vandaag</a>
      <a href="gewicht.html" class="active"><span class="ico">⚖️</span>Gewicht</a>
      <a class="fab" href="loggen.html" aria-label="Loggen">+</a>
      <a href="loggen.html"><span class="ico">🔍</span>Zoeken</a>
      <a href="profiel.html"><span class="ico">👤</span>Profiel</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/gewicht.js"></script>
</body>
</html>
