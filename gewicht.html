<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBFAF6">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Brightly - Gewicht</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div><h1>Gewicht</h1><div class="sub">Houd je gewicht bij</div></div>
    </header>

    <main class="page">
      <!-- Huidig gewicht -->
      <div class="card weight-hero">
        <div class="wh-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a3 3 0 0 1 2.8 2H19a2 2 0 0 1 2 2l-2 12a2 2 0 0 1-2 1.7H7A2 2 0 0 1 5 19L3 7a2 2 0 0 1 2-2h4.2A3 3 0 0 1 12 3Z"/>
            <path d="m9 12 3-3 3 3"/>
          </svg>
        </div>
        <div class="wh-info">
          <div class="wh-label">Huidig gewicht</div>
          <div class="wh-value"><span id="heroWeight">—</span> <span class="wh-unit">kg</span></div>
        </div>
        <div class="wh-delta" id="heroDelta"></div>
      </div>

      <form class="card" id="weightForm">
        <div class="card-title">Gewicht invullen</div>
        <div class="row">
          <div class="field">
            <label for="weight">Gewicht (kg)</label>
            <input class="input" id="weight" type="text" inputmode="decimal" placeholder="bv. 78.5" required>
          </div>
          <div class="field">
            <label for="date">Datum</label>
            <input class="input" id="date" type="date">
          </div>
        </div>
        <button class="btn" id="saveBtn" type="submit">Opslaan</button>
      </form>

      <div class="card">
        <div class="card-title">Verloop</div>
        <div id="chart"></div>
      </div>

      <div class="card">
        <div class="card-title">Recent</div>
        <div id="list"></div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="dashboard.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>Vandaag</a>
      <a href="gewicht.html" class="active"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg></span>Gewicht</a>
      <a href="loggen.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>Zoeken</a>
      <a href="profiel.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>Profiel</a>
      <a href="activiteit.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>Activiteit</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/gewicht.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
