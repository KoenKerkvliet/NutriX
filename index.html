<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBFAF6">
  <meta name="description" content="Brightly - houd je voeding, calorieën en gewicht eenvoudig bij.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Brightly - Inloggen</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="brand">
      <div class="logo">
        <img class="logo-mark" src="assets/brightly-icon.svg" alt="Brightly logo" width="52" height="52">
        <span class="logo-text">Brightly</span>
      </div>
      <p class="tagline">Houd je voeding & gewicht eenvoudig bij</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button id="tabLogin" class="active" type="button">Inloggen</button>
        <button id="tabRegister" type="button">Registreren</button>
      </div>

      <div id="alert" class="alert hidden"></div>

      <!-- Inloggen -->
      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">E-mailadres</label>
          <input class="input" type="email" id="loginEmail" autocomplete="email" required placeholder="jij@voorbeeld.nl">
        </div>
        <div class="field">
          <label for="loginPassword">Wachtwoord</label>
          <input class="input" type="password" id="loginPassword" autocomplete="current-password" required placeholder="••••••••">
        </div>
        <button class="btn" type="submit" id="loginBtn">Inloggen</button>
        <p class="center" style="margin-top:14px;">
          <a href="#" id="forgotLink">Wachtwoord vergeten?</a>
        </p>
      </form>

      <!-- Registreren -->
      <form id="registerForm" class="hidden">
        <div class="field">
          <label for="regName">Naam</label>
          <input class="input" type="text" id="regName" autocomplete="name" required placeholder="Je naam">
        </div>
        <div class="field">
          <label for="regEmail">E-mailadres</label>
          <input class="input" type="email" id="regEmail" autocomplete="email" required placeholder="jij@voorbeeld.nl">
        </div>
        <div class="field">
          <label for="regPassword">Wachtwoord</label>
          <input class="input" type="password" id="regPassword" autocomplete="new-password" required minlength="6" placeholder="Minimaal 6 tekens">
        </div>
        <button class="btn" type="submit" id="registerBtn">Account aanmaken</button>
      </form>
    </div>

    <p class="center muted" style="font-size:.8rem;">Door verder te gaan ga je akkoord met het gebruik van Brightly.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const alertBox = $('alert');

    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = 'alert ' + (type === 'ok' ? 'alert-ok' : 'alert-error');
    }
    function clearAlert() { alertBox.className = 'alert hidden'; }

    // Tabs
    function setTab(which) {
      const login = which === 'login';
      $('tabLogin').classList.toggle('active', login);
      $('tabRegister').classList.toggle('active', !login);
      $('loginForm').classList.toggle('hidden', !login);
      $('registerForm').classList.toggle('hidden', login);
      clearAlert();
    }
    $('tabLogin').onclick = () => setTab('login');
    $('tabRegister').onclick = () => setTab('register');

    // Al ingelogd? Door naar dashboard.
    redirectIfLoggedIn();

    // Inloggen
    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();
      const btn = $('loginBtn'); btn.disabled = true; btn.textContent = 'Bezig...';
      try {
        await signIn($('loginEmail').value.trim(), $('loginPassword').value);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert(authErrorNL(err));
        btn.disabled = false; btn.textContent = 'Inloggen';
      }
    });

    // Registreren
    $('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();
      const btn = $('registerBtn'); btn.disabled = true; btn.textContent = 'Bezig...';
      try {
        const { data } = await signUp($('regEmail').value.trim(), $('regPassword').value, $('regName').value.trim());
        if (data.session) {
          window.location.href = 'profiel.html'; // direct profiel invullen
        } else {
          showAlert('Account aangemaakt! Bevestig je e-mailadres via de mail die we stuurden.', 'ok');
          setTab('login');
        }
      } catch (err) {
        showAlert(authErrorNL(err));
      } finally {
        btn.disabled = false; btn.textContent = 'Account aanmaken';
      }
    });

    // Wachtwoord vergeten
    $('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = $('loginEmail').value.trim();
      if (!email) { showAlert('Vul eerst je e-mailadres in.'); return; }
      try {
        await resetPassword(email);
        showAlert('We hebben je een mail gestuurd om je wachtwoord te resetten.', 'ok');
      } catch (err) {
        showAlert(authErrorNL(err));
      }
    });
  </script>
</body>
</html>
