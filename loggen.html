<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBFAF6">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Brightly - Loggen</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div><h1>Toevoegen</h1><div class="sub">Zoek of scan een product</div></div>
      <a class="btn btn-secondary btn-sm" href="dashboard.html">Klaar</a>
    </header>

    <main class="page">
      <div class="search-bar">
        <input class="input" id="searchInput" type="search" placeholder="Zoek een product…" autocomplete="off">
        <button class="scan-btn" id="scanBtn" type="button" aria-label="Barcode scannen">📷</button>
      </div>
      <div class="center" style="margin:4px 0 8px;">
        <a class="btn-ghost btn btn-sm" id="newProdLink" href="product.html">+ Eigen product aanmaken</a>
      </div>
      <div class="chips cat-filter" id="catFilter"></div>
      <div id="results"></div>
    </main>

    <nav class="bottom-nav">
      <a href="dashboard.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>Vandaag</a>
      <a href="gewicht.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg></span>Gewicht</a>
      <a href="loggen.html" class="active"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>Zoeken</a>
      <a href="kalender.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>Kalender</a>
      <a href="profiel.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>Profiel</a>
    </nav>
  </div>

  <!-- Hoeveelheid-sheet -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <div class="flex-between">
      <h3 id="sheetTitle">Product</h3>
      <button class="scan-close" id="sheetClose" style="background:var(--bg);color:var(--ink);">✕</button>
    </div>
    <div class="sub" id="sheetSub"></div>

    <div class="kcal-preview"><span class="n" id="kcalPreview">0</span> <span class="u">kcal</span></div>

    <div class="field">
      <label for="amount">Hoeveelheid (gram / ml)</label>
      <input class="input" id="amount" type="text" inputmode="decimal" value="100">
      <div class="chips" id="amountChips"></div>
    </div>

    <div class="field">
      <label>Aantal porties</label>
      <div class="qty qty-lg">
        <button class="qty-btn" id="qtyDec" type="button" aria-label="Minder">−</button>
        <span class="qty-n" id="qtyN">1</span>
        <button class="qty-btn" id="qtyInc" type="button" aria-label="Meer">+</button>
      </div>
    </div>

    <div class="field">
      <label>Maaltijd</label>
      <div class="chips" id="mealChips"></div>
    </div>

    <button class="btn" id="addBtn" type="button">Toevoegen</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/openfoodfacts.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/loggen.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
