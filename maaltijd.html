<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBFAF6">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Brightly - Maaltijd</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar appbar-top">
      <a class="nav-day" id="backLink" href="dashboard.html" aria-label="Terug naar dashboard">‹</a>
      <div class="day-center" style="cursor:default;">
        <span class="day-title" id="mealTitle">Maaltijd</span>
        <span class="sub" id="mealSub"></span>
      </div>
      <span class="nav-day" aria-hidden="true" style="visibility:hidden;">‹</span>
    </header>

    <main class="page">
      <div class="card stats-card">
        <div class="stat"><div class="stat-num" id="stKcal">0</div><div class="stat-lbl">kcal</div></div>
        <div class="stat"><div class="stat-num" id="stCarb">0 g</div><div class="stat-lbl">Koolhydraten</div></div>
        <div class="stat"><div class="stat-num" id="stProtein">0 g</div><div class="stat-lbl">Eiwit</div></div>
        <div class="stat"><div class="stat-num" id="stFat">0 g</div><div class="stat-lbl">Vet</div></div>
      </div>

      <div id="items"></div>
      <a class="btn" id="addBtn" href="#">+ Voeding toevoegen</a>
    </main>

    <nav class="bottom-nav">
      <a href="dashboard.html" class="active"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>Vandaag</a>
      <a href="gewicht.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg></span>Gewicht</a>
      <a href="loggen.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>Zoeken</a>
      <a href="kalender.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>Kalender</a>
      <a href="profiel.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>Profiel</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/mealsplit.js"></script>
  <script src="js/maaltijd.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
