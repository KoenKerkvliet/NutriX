<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>NutriX - Eigen product</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div><h1>Eigen product</h1><div class="sub">Voedingswaarden per 100 g / ml</div></div>
      <a class="btn btn-secondary btn-sm" id="backLink" href="loggen.html">Terug</a>
    </header>

    <main class="page">
      <div id="alert" class="alert hidden"></div>
      <form id="productForm" class="card">
        <div class="field">
          <label for="name">Naam *</label>
          <input class="input" id="name" type="text" required placeholder="bv. Volkoren cracker">
        </div>
        <div class="row">
          <div class="field">
            <label for="brand">Merk</label>
            <input class="input" id="brand" type="text" placeholder="Optioneel">
          </div>
          <div class="field">
            <label for="barcode">Streepjescode</label>
            <input class="input" id="barcode" type="text" inputmode="numeric" placeholder="Optioneel">
          </div>
        </div>

        <div class="card-title" style="margin-top:6px;">Per 100 gram / ml</div>
        <div class="row">
          <div class="field">
            <label for="kcal">Calorieën (kcal) *</label>
            <input class="input" id="kcal" type="number" inputmode="decimal" min="0" required placeholder="0">
          </div>
          <div class="field">
            <label for="protein">Eiwit (g)</label>
            <input class="input" id="protein" type="number" inputmode="decimal" min="0" placeholder="0">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="carbs">Koolhydraten (g)</label>
            <input class="input" id="carbs" type="number" inputmode="decimal" min="0" placeholder="0">
          </div>
          <div class="field">
            <label for="fat">Vet (g)</label>
            <input class="input" id="fat" type="number" inputmode="decimal" min="0" placeholder="0">
          </div>
        </div>
        <div class="field">
          <label for="serving">Standaard portie (g) — optioneel</label>
          <input class="input" id="serving" type="number" inputmode="decimal" min="0" placeholder="bv. 30">
        </div>

        <button class="btn" id="saveBtn" type="submit">Opslaan</button>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
