<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FBFAF6">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Brightly - Snel loggen</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar appbar-top">
      <a class="nav-day" id="backLink" href="dashboard.html" aria-label="Terug naar dashboard">‹</a>
      <div class="day-center" style="cursor:default;">
        <span class="day-title">Snel loggen</span>
        <span class="sub">Vertel je dag, AI vult het in</span>
      </div>
      <span class="nav-day" aria-hidden="true" style="visibility:hidden;">‹</span>
    </header>

    <main class="page">
      <div id="alert" class="alert hidden"></div>

      <div class="card">
        <div class="field">
          <label for="logDate">Voor welke dag?</label>
          <input class="input" id="logDate" type="date">
        </div>
        <div class="field">
          <label for="transcript">Wat heb je gegeten en gedronken?</label>
          <textarea class="input" id="transcript" rows="8" placeholder="Bijvoorbeeld: Als ontbijt twee bruine boterhammen met kaas en een kop koffie. Tussendoor een appel. Als lunch een broodje gezond en een glas melk. 's Avonds spaghetti bolognese met twee glazen wijn."></textarea>
          <button class="btn btn-secondary" id="recBtn" type="button" style="display:none;margin-top:8px;">🎙️ Inspreken</button>
          <div class="hint">Plak een transcript, typ het, of spreek het in. AI verdeelt het over ontbijt, lunch, diner, tussendoor en drinken — bij benadering.</div>
        </div>
        <button class="btn" id="parseBtn" type="button">✨ Verwerk met AI</button>
      </div>

      <div id="results"></div>
      <button class="btn hidden" id="logBtn" type="button">Toevoegen aan dagboek</button>
      <div class="spacer"></div>
    </main>

    <nav class="bottom-nav">
      <a href="dashboard.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>Vandaag</a>
      <a href="loggen.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>Zoeken</a>
      <a href="kalender.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>Kalender</a>
      <a href="profiel.html"><span class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>Profiel</a>
    </nav>
  </div>

  <script src="js/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/snel-loggen.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
